version: 2

sources:
  - name: olist
    description: "Dados brutos Olist importados para DuckDB"
    tables:
      - name: raw_orders
        description: "Pedidos brutos"
      - name: raw_customers
        description: "Clientes brutos"
      - name: raw_order_items
        description: "Itens de pedido brutos"
      - name: raw_products
        description: "Produtos brutos"
      - name: raw_reviews
        description: "Avaliações brutas"

models:
  - name: stg_orders
    description: "Pedidos Olist limpos e padronizados"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null

  - name: stg_customers
    description: "Clientes Olist limpos"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_order_items
    description: "Itens de pedido limpos"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null

  - name: stg_products
    description: "Produtos Olist limpos"

  - name: stg_reviews
    description: "Avaliações limpas"

  - name: int_orders_completo
    description: "Pedidos detalhados com dados de cliente e produto"

  - name: int_customers_rfm
    description: "Métricas de cliente RFM"

  - name: mart_vendas_resumo
    description: "Resumo de vendas mensais"

  - name: mart_produtos_performance
    description: "Performance de produtos"